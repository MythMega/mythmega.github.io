<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Poké-feet Daily</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app">
    <header>
      <h1 data-i18n="daily.title">PokéPied Daily</h1>
      <i data-i18n="daily.includes">Inclut pokémon 1G, 2G, 3G et leurs formes régionales</i>
      <div class="scoreboard">
        <div class="round-gauge">
          <div class="round-dot" id="round-dot-0"></div>
          <div class="round-dot" id="round-dot-1"></div>
          <div class="round-dot" id="round-dot-2"></div>
          <div class="round-dot" id="round-dot-3"></div>
          <div class="round-dot" id="round-dot-4"></div>
        </div>
        <div class="score-display"><span data-i18n="daily.score">Score</span> : <span id="dailyScore">0</span></div>
      </div>
    </header>

    <section class="game-area">
      <div class="center-card">
        <div class="image-gauge-row">
          <div class="pokemon-image">
            <img id="dailyImg" src="" alt="Pokémon" />
          </div>

          <div id="attemptGauge" class="attempt-gauge" aria-hidden="false">
            <div class="gauge-label">+10</div>
            <div class="gauge"><div class="gauge-fill" style="height:100%"></div></div>
          </div>
        </div>

        <div class="info-below">
          <div id="dailyReveal" class="hidden">
            <div><span data-i18n="daily.generation">Génération</span> : <span id="dGen"></span></div>
            <div><span data-i18n="daily.index">Index</span> : <span id="dIndex"></span></div>
            <div><span data-i18n="daily.type1">Type 1</span> : <span id="dT1"></span></div>
            <div><span data-i18n="daily.type2">Type 2</span> : <span id="dT2"></span></div>
          </div>
          <div id="dailyFailedAttempts" class="failed-attempts hidden" aria-live="polite"></div>
        </div>

        <div class="guess-area">
          <div class="autocomplete-wrap">
            <input id="dailyInput" type="text" autocomplete="off" data-i18n-attr="placeholder:daily.placeholder" placeholder="Tapez le nom FR ou EN" />
            <div id="namesDropdown" class="autocomplete-dropdown hidden"></div>
          </div>
          <button id="dailySubmit" data-i18n="daily.submit">Valider</button>
          <button id="dailySkip" class="secondary" data-i18n="daily.skip">Passer</button>
        </div>

        <div id="newPokemonsAlert" class="hidden" style="background-color:#FFD700;color:#000;padding:10px;border-radius:8px;margin-bottom:10px;font-weight:bold;"></div>
        <div id="afterDone" class="hidden" style="margin-top:12px; text-align:left;">
          <h3 data-i18n="daily.gameComplete">Partie terminée</h3>
          <div id="shareTextArea" style="white-space:pre-wrap; font-family:monospace; background:rgba(255,255,255,0.03); padding:8px; border-radius:8px;"></div>
          <div id="dailyFullImages" class="daily-full-images" style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap;"></div>
          <button id="copyShare" data-i18n="daily.copy">Copier</button>
          <button id="copyDiscordShare" data-i18n="daily.shareDiscord">Partager Discord</button>
          <button id="viewDetails" data-i18n="daily.viewDetails">Voir détails</button>
        </div>
      </div>
    </section>

    <aside id="hints">
      <h3>Indices</h3>
      <ul id="dailyHints"></ul>
    </aside>

    <div id="notifications" aria-live="polite"></div>
  </main>

    <a href="./index.html"><button id="retourBtn" class="secondary" style="padding:10px 12px;" data-i18n="common.backHome">Retour à l'accueil</button></a>

  <script src="loader.js"></script>
  <script src="translate.js"></script>
  <script src="language-switcher.js"></script>
  <script src="i18n-setup.js"></script>
  <script src="pokemon.js"></script>
  <script src="migration.js"></script>
  <script src="Dex.js"></script>
  <script src="daily.js"></script>
</body>
</html>

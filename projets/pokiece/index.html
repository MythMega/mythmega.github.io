<!DOCTYPE html>
<html lang="fr"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokiéce - Pokémon Qui est-ce ?</title>

    <!-- Description SEO -->
    <meta name="description" content="Pokiéce est un jeu inspiré du Qui est-ce ? version Pokémon. Devinez le Pokémon mystère en posant les bonnes questions ! Jouez a plusieurs avec un simple code !">

    <link rel="stylesheet" href="./styles/style.css">
    <script>
        // Appliquer le dark mode immédiatement si activé
        (function() {
            const darkMode = document.cookie.split('; ').find(row => row.startsWith('darkMode='));
            if (darkMode && darkMode.split('=')[1] === 'dark') {
                document.documentElement.classList.add('dark-mode');
            }
        })();
    </script>
</head>
<body>
    <!-- Boutons flottants -->
    <button id="languageBtn" class="floating-btn language-btn" title="Toggle Language">🌐</button>
    <button id="darkModeBtn" class="floating-btn dark-mode-btn" title="Toggle Dark Mode">🌙</button>

    <div class="container">
        <!-- En-tête -->
        <header>
            <h1 data-i18n="title">Pokiéce</h1>
            <p data-i18n="subtitle">Qui est-ce Pokémon ?</p>
        </header>

        <!-- Contenu principal -->
        <main>
            <!-- Section: Nouvelle partie -->
            <section class="section new-game-section">
                <h2 data-i18n="newGame">Nouvelle partie</h2>
                <p data-i18n="newGameDesc">Jouez avec 30 Pokémons aléatoires</p>
                <button id="startBtn" class="btn btn-primary" data-i18n="start">Commencer</button>
            </section>

            <!-- Section: Partie personnalisée -->
            <section class="section custom-game-section">
                <h2 data-i18n="customGame">Partie personnalisée</h2>
                <p data-i18n="customGameDesc">Configurez le nombre de Pokémons et les séries</p>
                <button id="configBtn" class="btn btn-primary" data-i18n="customize">Personnaliser</button>
            </section>

            <!-- Section: Rejoindre une partie -->
            <section class="section join-game-section">
                <h2 data-i18n="joinGame">Rejoindre une partie</h2>
                <p data-i18n="joinGameDesc">Entrez le code d'une partie existante</p>
                <div class="input-group">
                    <input 
                        type="text" 
                        id="codeInput" 
                        class="input-code" 
                        placeholder="XXXXXXXX"
                        data-i18n-placeholder="codeInputPlaceholder"
                    >
                    <button id="joinBtn" class="btn btn-primary" data-i18n="join">Rejoindre</button>
                </div>
            </section>

            <!-- Footer avec lien crédits -->
            <footer class="footer-links">
                <a href="./credits.html" data-i18n="credits">Crédits</a>
            </footer>
        </main>
    </div>

    <!-- Scripts -->
    <script src="./js/mons.js"></script>
    <script src="./js/initmons.js"></script>
    <script src="./js/translation.js"></script>
    <script src="./js/global.js"></script>
    <script>
        // === Index.html - Script principal ===
        console.log('%c🎮 Page Index - Qui est-ce Pokémon', 'color: #00ffff; font-weight: bold; font-size: 14px');

        // Récupérer les éléments du DOM
        const startBtn = document.getElementById('startBtn');
        const joinBtn = document.getElementById('joinBtn');
        const codeInput = document.getElementById('codeInput');
        const configBtn = document.getElementById('configBtn');

        /**
         * Démarrer une nouvelle partie
         * Redirige vers game.html sans paramètre
         */
        startBtn.addEventListener('click', function() {
            console.log('✅ Bouton "Commencer" cliqué');
            window.location.href = './game.html';
        });

        /**
         * Accéder à la configuration personnalisée
         * Redirige vers config.html
         */
        configBtn.addEventListener('click', function() {
            console.log('✅ Bouton "Personnaliser" cliqué');
            window.location.href = './config.html';
        });

        /**
         * Rejoindre une partie existante
         * Récupère le code saisi et redirige vers game.html?Code=XXXX
         * Supporte aussi les URLs complètes, extrait le code automatiquement
         */
        joinBtn.addEventListener('click', function() {
            let input = codeInput.value.trim();
            console.log(`📝 Entrée saisie: ${input}`);
            
            if (input === '') {
                console.warn('⚠️ Entrée vide - aucune redirection');
                alert(getTranslation('emptyCode'));
                return;
            }
            
            // Extraire le code si une URL complète est fournie
            let code = input;
            if (input.includes('game.html?Code=')) {
                // C'est une URL complète, extraire le code
                const urlParams = new URL(input, window.location.origin).searchParams;
                code = urlParams.get('Code');
                console.log(`🔗 Code extrait de l'URL: ${code}`);
            } else if (input.includes('Code=')) {
                // C'est une URL partielle avec le paramètre Code
                const urlParams = new URL('http://localhost' + (input.startsWith('?') ? '' : '?') + input);
                code = urlParams.searchParams.get('Code') || input;
                console.log(`🔗 Code extrait des paramètres: ${code}`);
            } else {
                // C'est déjà un code
                code = input.toUpperCase();
                console.log(`📝 Code direct: ${code}`);
            }
            
            if (!code) {
                console.warn('⚠️ Impossible d\'extraire le code');
                alert(getTranslation('invalidCode'));
                return;
            }
            
            console.log(`🚀 Redirection vers game.html avec code: ${code}`);
            window.location.href = `./game.html?Code=${code}`;
        });

        // Permettre la validation avec la touche Entrée
        codeInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                console.log('⌨️ Touche Entrée détectée');
                joinBtn.click();
            }
        });

        // Initialiser la traduction au chargement
        document.addEventListener('DOMContentLoaded', function() {
            console.log('📄 Page index.html chargée');
            applyTranslation();
        });
    </script>
</body>
</html>

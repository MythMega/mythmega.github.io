<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Upload your own custom bingo dataset JSON and play with AutoBingo. Perfect for streamers and custom themes. OBS overlay support included.">
    <meta name="keywords" content="custom bingo, upload bingo, custom bingo dataset, streamer bingo, OBS overlay, custom json bingo">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="AutoBingo - Custom Bingo">
    <meta property="og:description" content="Upload your own bingo dataset and play. OBS overlay support for streamers.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mythmega.github.io/custom_bingo.html">
    <link rel="canonical" href="https://mythmega.github.io/custom_bingo.html">
    <title>AutoBingo - Custom Bingo | Upload Your Own Dataset</title>
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/nav.css">
    <link rel="stylesheet" href="styles/bingo.css">
</head>
<body class="custom-bingo-page">
    <!-- Navigation -->
    <div id="nav-container"></div>

    <!-- Main Content -->
    <main class="main-content">
        <div id="custom-bingo-content"></div>
    </main>

    <!-- Scripts - Entity -->
    <script src="js/entity/DatasetDefinition.js"></script>
    <script src="js/entity/DatasetItem.js"></script>
    <script src="js/entity/BingoGame.js"></script>
    <script src="js/entity/BingoCell.js"></script>

    <!-- Scripts - Business -->
    <script src="js/business/cookieManager.js"></script>
    <script src="js/business/translationManager.js"></script>
    <script src="js/business/themeManager.js"></script>
    <script src="js/business/navigationManager.js"></script>
    <script src="js/business/bingoGameManager.js"></script>

    <!-- Scripts - Visual -->
    <script src="js/visual/navRenderer.js"></script>
    <script src="js/visual/themeToggle.js"></script>
    <script src="js/visual/languageToggle.js"></script>
    <script src="js/visual/bingoGridRenderer.js"></script>
    <script src="js/visual/customBingoApp.js"></script>

    <!-- Init -->
    <script>
        (async function() {
            'use strict';

            // Check overlay mode from URL
            const overlayParam = AutoBingo.NavigationManager.getParam('overlay');
            const isOverlay = overlayParam === '1';

            // Check language override from URL
            const langUrl = AutoBingo.NavigationManager.getParam('lang');
            const lang = langUrl || AutoBingo.CookieManager.get('bingo_lang') || 'en';

            // Init managers
            AutoBingo.ThemeManager.init();

            const translator = new AutoBingo.TranslationManager();
            AutoBingo.translationManager = translator;
            await translator.load(lang);

            // Render navigation (hidden in overlay mode)
            if (!isOverlay) {
                AutoBingo.NavRenderer.render(document.getElementById('nav-container'));
            }

            // Create floating toggles (hidden in overlay mode)
            if (!isOverlay) {
                AutoBingo.ThemeToggle.create();
                AutoBingo.LanguageToggle.create();
            }

            // Store overlay/lang info for the custom app
            AutoBingo._customBingoOverlay = isOverlay;
            AutoBingo._customBingoOverrideLang = langUrl || null;

            // Init custom bingo app
            AutoBingo.CustomBingoApp.init();

            // Apply overlay CSS class to body
            if (isOverlay) {
                document.body.classList.add('overlay-mode');
            }

            // Translate page
            translator.translatePage();
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PokeLeague - Challengers</title>
    <link rel="stylesheet" href="style/main.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
</head>
<body>
    <div class="page-container">
        <h1 class="page-title">⚔️ Challengers</h1>
        <p class="page-subtitle">Recherchez un challenger pour voir ses matchs</p>
        
        <div class="search-container">
            <div class="search-box">
                <input type="text" id="user-search" placeholder="Rechercher un challenger..." autocomplete="off">
                <button id="search-btn" class="search-btn">Rechercher</button>
            </div>
        </div>

        <div id="results-list" class="users-list"></div>
    </div>

    <script src="js/data/config.js"></script>
    <script src="js/data/spreadsheet.js"></script>
    <script src="js/business/utils.js"></script>
    <script src="js/business/users.js"></script>
    <script src="js/visual/nav.js"></script>
    <script src="js/visual/users-display.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            UsersDisplay.initSearch();
        });
    </script>
</body>
</html>

<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pokefeet — Défis Passés</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .tabs { display:flex; gap:6px; margin-bottom:14px; }
    .tab-btn {
      flex:1; padding:8px 0; border:1px solid rgba(255,255,255,0.1);
      border-radius:8px; background:rgba(255,255,255,0.03);
      color:var(--muted,#94a3b8); cursor:pointer; font-weight:600;
      font-size:.9rem; transition:background .15s,color .15s;
    }
    .tab-btn.active { background:var(--accent,#34d399); color:#052018; border-color:transparent; }
  </style>
</head>

<body>
  <main id="app">
    <header>
      <h1 data-i18n="home.pastChallenges">Défis passés</h1>
    </header>

    <section class="game-area">
      <div class="center-card" style="max-width: 700px;">
        <a href="index.html" class="back-button" data-i18n="common.backHome">← Retour</a>

        <div class="tabs" style="margin-top:14px;">
          <button class="tab-btn active" id="tabDailyBtn" data-i18n="oldDaily.tabDaily">Daily</button>
          <button class="tab-btn" id="tabWeeklyBtn" data-i18n="oldDaily.tabWeekly">Weekly</button>
        </div>

        <div id="dailiesContainer" class="daily-grid"></div>
        <div id="weekliesContainer" class="daily-grid" style="display:none;"></div>

        <div id="noDailies" class="no-dailies hidden" data-i18n="oldDaily.noChallenge">
          Aucun défi trouvé pour le moment.
        </div>
      </div>
    </section>
  </main>

  <div id="notifications"></div>

  <script src="loader.js"></script>
  <script src="translate.js"></script>
  <script src="language-switcher.js"></script>
  <script src="i18n-setup.js"></script>
  <script src="pokemon.js"></script>
  <script src="daily.js"></script>
  <script src="weekly.js"></script>
  <script src="old_daily.js"></script>
</html>

<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AutoBingo - Create customizable bingo grids for 25+ games including Minecraft, Pokémon, Zelda, Elden Ring and more. Streamer-friendly with OBS overlay support. Free and open source.">
    <meta name="keywords" content="bingo, bingo generator, minecraft bingo, pokemon bingo, zelda bingo, elden ring bingo, streamer tools, OBS overlay, gaming bingo, custom bingo, random bingo">
    <meta name="author" content="AutoBingo">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="AutoBingo - Free Customizable Bingo Generator for Gamers">
    <meta property="og:description" content="Create bingo grids for 25+ games with 300+ presets. Streamer-friendly OBS overlay support. Free and open source.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mythmega.github.io/">
    <meta property="og:image" content="https://mythmega.github.io/assets/og-image.png">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="AutoBingo - Free Customizable Bingo Generator">
    <meta name="twitter:description" content="Create bingo grids for 25+ games. Streamer-friendly with OBS overlay.">
    <link rel="canonical" href="https://mythmega.github.io/">
    <title>AutoBingo - Free Customizable Bingo Generator for 25+ Games</title>
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/nav.css">
    <script type="application/ld+json">
    {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "AutoBingo",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Web",
        "offers": {
            "@type": "Offer",
            "price": "0",
            "priceCurrency": "EUR"
        },
        "description": "Free customizable bingo grid generator for gamers and streamers. Supports 25+ games with 300+ presets.",
        "featureList": [
            "300+ bingo presets",
            "25+ supported games",
            "OBS overlay support",
            "Custom bingo creation",
            "Randomizable grids",
            "Multi-language (EN/FR)"
        ]
    }
    </script>
</head>
<body>
    <!-- Navigation -->
    <div id="nav-container"></div>

    <!-- Main Content -->
    <main class="main-content">
        <div class="card text-center">
            <h1 class="page-title" data-i18n="home.title">AutoBingo</h1>
            <p class="page-subtitle" data-i18n="home.subtitle">Create and play bingo games from your favorite datasets!</p>

            <div class="home-games-count mt-16">
                <span id="games-count-text">Supported games: --</span>
                <button class="btn-games-info" id="games-info-btn" title="View all supported games">?</button>
            </div>
            <div class="home-datasets-count">
                <span id="datasets-count-text">Datasets: --</span>
            </div>

            <button class="btn btn-primary mt-24" onclick="window.location.href='create_bingo.html'" data-i18n="home.create_button">
                Create a Bingo Grid
            </button>
        </div>

        <!-- Games list popup -->
        <div class="games-popup hidden" id="games-popup">
            <div class="games-popup-content">
                <div class="games-popup-header">
                    <h3 data-i18n="home.games_list_title">Supported Games</h3>
                    <button class="games-popup-close" id="games-popup-close">&times;</button>
                </div>
                <div class="games-popup-list" id="games-popup-list"></div>
            </div>
        </div>

        <!-- Presets Section -->
        <div class="card mt-24" id="presets-section" style="display:none;">
            <h2 class="card-title" data-i18n="home.presets_title">Saved Presets</h2>
            <div id="presets-list"></div>
        </div>
    </main>

    <!-- Scripts - Entity -->
    <script src="js/entity/DatasetDefinition.js"></script>
    <script src="js/entity/DatasetItem.js"></script>
    <script src="js/entity/BingoGame.js"></script>

    <!-- Scripts - Business -->
    <script src="js/business/cookieManager.js"></script>
    <script src="js/business/translationManager.js"></script>
    <script src="js/business/themeManager.js"></script>
    <script src="js/business/datasetManager.js"></script>
    <script src="js/business/navigationManager.js"></script>
    <script src="js/business/presetManager.js"></script>

    <!-- Scripts - Visual -->
    <script src="js/visual/navRenderer.js"></script>
    <script src="js/visual/themeToggle.js"></script>
    <script src="js/visual/languageToggle.js"></script>

    <!-- Init -->
    <script>
        (async function() {
            'use strict';

            // Init cookie-based managers
            AutoBingo.ThemeManager.init();

            // Init translation from cookie
            const lang = AutoBingo.CookieManager.get('bingo_lang') || 'en';
            const translator = new AutoBingo.TranslationManager();
            AutoBingo.translationManager = translator;
            await translator.load(lang);

            // Render navigation
            AutoBingo.NavRenderer.render(document.getElementById('nav-container'));

            // Create floating toggles
            AutoBingo.ThemeToggle.create();
            AutoBingo.LanguageToggle.create();

            // Load stats (games count, datasets count)
            await loadStats();

            // Render presets
            renderPresets();

            // Translate page
            translator.translatePage();
        })();

        async function loadStats() {
            const lang = AutoBingo.translationManager ? AutoBingo.translationManager.currentLang : 'en';

            try {
                // Load games count
                const resp = await fetch('metadata/games.json');
                const games = await resp.json();
                const countSpan = document.getElementById('games-count-text');
                if (lang === 'fr') {
                    countSpan.textContent = `${games.length} jeux supportés`;
                } else {
                    countSpan.textContent = `${games.length} supported games`;
                }

                // Popup toggle
                const infoBtn = document.getElementById('games-info-btn');
                const popup = document.getElementById('games-popup');
                const closeBtn = document.getElementById('games-popup-close');
                const list = document.getElementById('games-popup-list');

                infoBtn.addEventListener('click', () => {
                    popup.classList.toggle('hidden');
                });

                closeBtn.addEventListener('click', () => {
                    popup.classList.add('hidden');
                });

                popup.addEventListener('click', (e) => {
                    if (e.target === popup) {
                        popup.classList.add('hidden');
                    }
                });

                // Populate list
                list.innerHTML = '';
                games.forEach(game => {
                    const div = document.createElement('div');
                    div.className = 'games-popup-item';
                    div.textContent = game;
                    list.appendChild(div);
                });
            } catch (e) {
                console.warn('Failed to load games.json', e);
            }

            try {
                // Load datasets count
                const dsResp = await fetch('datasets.json');
                const datasets = await dsResp.json();
                const dsSpan = document.getElementById('datasets-count-text');
                if (lang === 'fr') {
                    dsSpan.textContent = `${datasets.length} datasets`;
                } else {
                    dsSpan.textContent = `${datasets.length} datasets`;
                }
            } catch (e) {
                console.warn('Failed to load datasets.json', e);
            }
        }

        function renderPresets() {
            const presets = AutoBingo.PresetManager.loadAll();
            const section = document.getElementById('presets-section');
            const list = document.getElementById('presets-list');

            if (presets.length === 0) {
                section.style.display = 'none';
                return;
            }

            section.style.display = 'block';
            list.innerHTML = '';

            presets.forEach(preset => {
                const item = document.createElement('div');
                item.className = 'preset-item';

                const info = document.createElement('div');
                info.className = 'preset-info';

                const nameSpan = document.createElement('span');
                nameSpan.className = 'preset-dataset';
                nameSpan.textContent = preset.dataset;
                info.appendChild(nameSpan);

                const detailSpan = document.createElement('span');
                detailSpan.className = 'preset-detail';
                const lang = AutoBingo.translationManager ? AutoBingo.translationManager.currentLang : 'en';
                let detailText = `${preset.category} › ${preset.subcategory} — ${preset.size}x${preset.size}`;
                const controls = [];
                if (preset.lock) controls.push(lang === 'fr' ? 'Verrouillé' : 'Locked');
                if (preset.hide) controls.push(lang === 'fr' ? 'Caché' : 'Hidden');
                if (preset.blur) controls.push(lang === 'fr' ? 'Flou' : 'Blurred');
                if (controls.length > 0) {
                    detailText += ` (${controls.join(', ')})`;
                }
                detailSpan.textContent = detailText;
                info.appendChild(detailSpan);

                item.appendChild(info);

                const actions = document.createElement('div');
                actions.className = 'preset-actions';

                // Play button
                const playBtn = document.createElement('button');
                playBtn.className = 'btn btn-primary preset-btn';
                playBtn.setAttribute('data-i18n', 'home.preset_play');
                playBtn.textContent = '▶ Play';
                playBtn.addEventListener('click', () => {
                    const params = { id: preset.dataset, size: preset.size };
                    if (preset.lock || preset.hide || preset.blur) {
                        params.controls = (preset.lock ? '1' : '0') + (preset.hide ? '1' : '0') + (preset.blur ? '1' : '0');
                    }
                    AutoBingo.NavigationManager.navigateTo('bingo.html', params);
                });
                actions.appendChild(playBtn);

                // Configure button
                const configBtn = document.createElement('button');
                configBtn.className = 'btn btn-secondary preset-btn';
                configBtn.setAttribute('data-i18n', 'home.preset_configure');
                configBtn.textContent = '⚙ Configure';
                configBtn.addEventListener('click', () => {
                    const params = { Dataset: preset.dataset, Size: preset.size };
                    if (preset.lock || preset.hide || preset.blur) {
                        params.controls = (preset.lock ? '1' : '0') + (preset.hide ? '1' : '0') + (preset.blur ? '1' : '0');
                    }
                    AutoBingo.NavigationManager.navigateTo('create_bingo.html', params);
                });
                actions.appendChild(configBtn);

                // Delete button
                const delBtn = document.createElement('button');
                delBtn.className = 'btn btn-secondary preset-btn preset-delete';
                delBtn.setAttribute('data-i18n', 'home.preset_delete');
                delBtn.textContent = '✕ Delete';
                delBtn.addEventListener('click', () => {
                    AutoBingo.PresetManager.delete(preset.id);
                    renderPresets();
                    if (AutoBingo.translationManager) {
                        AutoBingo.translationManager.translatePage();
                    }
                });
                actions.appendChild(delBtn);

                // Share button
                const shareBtn = document.createElement('button');
                shareBtn.className = 'btn btn-secondary preset-btn preset-share';
                shareBtn.setAttribute('data-i18n', 'home.preset_share');
                shareBtn.textContent = '🔗 Share';
                shareBtn.addEventListener('click', () => {
                    const url = AutoBingo.PresetManager.getShareUrl(preset);
                    if (navigator.share) {
                        navigator.share({
                            title: 'AutoBingo Grid',
                            text: `Check out this ${preset.size}x${preset.size} ${preset.dataset} bingo grid!`,
                            url: url
                        }).catch(() => {});
                    } else {
                        navigator.clipboard.writeText(url).then(() => {
                            shareBtn.textContent = '✓ Copied!';
                            setTimeout(() => {
                                shareBtn.textContent = '🔗 Share';
                                if (AutoBingo.translationManager) {
                                    shareBtn.setAttribute('data-i18n', 'home.preset_share');
                                    AutoBingo.translationManager.translatePage();
                                }
                            }, 2000);
                        }).catch(() => {
                            prompt('Copy this link:', url);
                        });
                    }
                });
                actions.appendChild(shareBtn);

                item.appendChild(actions);
                list.appendChild(item);
            });
        }
    </script>
</body>
</html>

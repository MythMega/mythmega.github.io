<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Présentation Développeur Java</title>

  <!-- Police moderne -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Feuille de style -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="page">
    <section class="profile-card" aria-label="Présentation développeur Java">
      <!-- Colonne gauche texte -->
      <div class="profile-text" role="article">
        <h1 class="title">DÉVELOPPEUR JAVA</h1>
        <h2 class="subtitle">BACKEND</h2>
        <p class="description">
          Passionné par le développement backend, je conçois des architectures performantes et maintenables avec Java et l’écosystème Spring.
          Mon objectif : transformer des besoins métiers complexes en solutions logicielles robustes et évolutives.
        </p>
      </div>

      <!-- Colonne droite image + disponibilités -->
      <aside class="profile-visual" aria-label="Photo et disponibilités">
        <figure class="photo-wrap">
          <img src="./Assets/profile.jpeg" alt="Photo du développeur" class="profile-photo" />
          <figcaption class="availability">
            <p class="availability-text">
              Actuellement ouvert aux opportunités en CDI ou missions freelance sur des projets Java / Spring Boot.
            </p>
            <a class="contact-btn" href="mailto:contact@example.com">Contactez-moi →</a>
          </figcaption>
        </figure>
      </aside>
    </section>
  </main>
</body>
</html>

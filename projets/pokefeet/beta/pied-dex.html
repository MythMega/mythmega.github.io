<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokefeet Dex</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1 data-i18n="dex.title">Pokefeet Dex</h1>
        
        <div class="progress-section">
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <span data-i18n="dex.progress">Progression</span> : <span id="progressText">0 / 0</span>
            <button id="forceUpdateBtn" data-i18n="dex.forceUpdate">Force Update</button>
        </div>

        <div class="filter-section">
            <input 
                type="text" 
                id="searchInput" 
                class="search-input"
                data-i18n-attr="placeholder:dex.search"
                placeholder="Rechercher par nom (FR/EN) ou index..."
            />
            <div class="filter-checkboxes">
                <label class="checkbox-label">
                    <input type="checkbox" id="showFoundCheckbox" />
                    <span data-i18n="dex.showFound">Afficher que obtenu</span>
                </label>
                <label class="checkbox-label">
                    <input type="checkbox" id="showNotFoundCheckbox" />
                    <span data-i18n="dex.showNotFound">Afficher que non obtenu</span>
                </label>
            </div>
        </div>

        <div class="sort-section">
            <label for="sortSelect" data-i18n="dex.sortBy">Trier par :</label>
            <select id="sortSelect">
                <option value="index" selected data-i18n="dex.sortIndex">Numéro Dex</option>
                <option value="name" data-i18n="dex.sortName">Nom</option>
                <option value="count" data-i18n="dex.sortCount">Fois rencontré</option>
                <option value="type" data-i18n="dex.sortType">Type</option>
                <option value="eggGroup" data-i18n="dex.sortEggGroup">Groupe d'œuf</option>
                <option value="firstFound" data-i18n="dex.sortFirstFound">Première trouvaille</option>
            </select>
            <button id="sortDirectionBtn" class="sort-direction-btn" data-direction="asc" data-i18n="dex.sortAsc">↑ Asc</button>
        </div>
        
        <div id="dexGrid" class="dex-grid">
            <!-- Pokemon entries will be inserted here -->
        </div>
    </div>

    <!-- Popup for details -->
    <div id="dexPopup" class="popup" style="display:none;">
        <div class="popup-content">
            <button id="closePopup" class="close-btn">&times;</button>
            <div id="popupDetails">
                <!-- Details will be inserted here -->
            </div>
        </div>
    </div>

    <script src="loader.js"></script>
    <script src="translate.js"></script>
    <script src="language-switcher.js"></script>
    <script src="footer.js"></script>
    <script src="i18n-setup.js"></script>
    <script src="pokemon.js"></script>
    <script src="Dex.js"></script>
    <script src="Dex-ui.js"></script>
    <script src="pokemon-versions.js"></script>
    <script src="DailyToDexImport.js"></script>
    <script>
      // Init Dex
      document.addEventListener('DOMContentLoaded', async () => {
        console.log('[Init] Starting Dex init');
        await Dex.init();
        const dexData = await Dex.getAllDexEntries();
        const progress = await Dex.getProgress();
        DexUI.updateProgress(progress.found, progress.total);
        DexUI.renderDexGrid(Dex.getAllPokemons(), dexData);
        DexUI.bindEvents();
        console.log('[Init] Dex init complete');
        window.scrollTo(0, 0);
      });
    </script>
</body>
</html>

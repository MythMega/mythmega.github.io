<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Browse and verify AutoBingo dataset items and images. View bingo dataset contents before creating your grid.">
    <meta name="keywords" content="dataset viewer, bingo datasets, browse bingo items, verify bingo images">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="AutoBingo - Dataset Viewer">
    <meta property="og:description" content="Browse and verify bingo dataset items and images.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mythmega.github.io/dataset.html">
    <link rel="canonical" href="https://mythmega.github.io/dataset.html">
    <title>AutoBingo - Dataset Viewer | Browse Bingo Items</title>
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/nav.css">
    <link rel="stylesheet" href="styles/dataset.css">
</head>
<body>
    <!-- Navigation -->
    <div id="nav-container"></div>

    <!-- Main Content -->
    <main class="main-content">
        <div class="card">
            <h1 class="page-title" data-i18n="dataset.title">Dataset Viewer</h1>
            <p class="page-subtitle" data-i18n="dataset.subtitle">Browse and verify dataset items and their images</p>

            <div id="selector-container"></div>
            <div id="dataset-viewer-container"></div>
        </div>
    </main>

    <!-- Scripts - Entity -->
    <script src="js/entity/DatasetDefinition.js"></script>
    <script src="js/entity/DatasetItem.js"></script>
    <script src="js/entity/BingoGame.js"></script>

    <!-- Scripts - Business -->
    <script src="js/business/cookieManager.js"></script>
    <script src="js/business/translationManager.js"></script>
    <script src="js/business/themeManager.js"></script>
    <script src="js/business/datasetManager.js"></script>
    <script src="js/business/navigationManager.js"></script>

    <!-- Scripts - Visual -->
    <script src="js/visual/navRenderer.js"></script>
    <script src="js/visual/themeToggle.js"></script>
    <script src="js/visual/languageToggle.js"></script>
    <script src="js/visual/datasetViewer.js"></script>

    <!-- Init -->
    <script>
        (async function() {
            'use strict';

            // Init managers
            AutoBingo.ThemeManager.init();

            const lang = AutoBingo.CookieManager.get('bingo_lang') || 'en';
            const translator = new AutoBingo.TranslationManager();
            AutoBingo.translationManager = translator;
            await translator.load(lang);

            // Render navigation
            AutoBingo.NavRenderer.render(document.getElementById('nav-container'));

            // Create floating toggles
            AutoBingo.ThemeToggle.create();
            AutoBingo.LanguageToggle.create();

            // Init dataset manager
            const datasetManager = new AutoBingo.DatasetManager();
            await datasetManager.loadDefinitions();

            // Create simplified dataset selector (no grid size)
            // We reuse parts of CategorySelector: just category, subcategory, dataset
            const selectorContainer = document.getElementById('selector-container');
            const categorySelect = document.createElement('div');
            categorySelect.className = 'select-wrapper';
            const catLabel = document.createElement('label');
            catLabel.setAttribute('data-i18n', 'create.select_category');
            catLabel.textContent = 'Category';
            categorySelect.appendChild(catLabel);
            const catSel = document.createElement('select');
            catSel.className = 'styled-select';
            const catPlaceholder = document.createElement('option');
            catPlaceholder.value = '';
            catPlaceholder.disabled = true;
            catPlaceholder.selected = true;
            catPlaceholder.setAttribute('data-i18n', 'create.no_category');
            catPlaceholder.textContent = '-- Select a category --';
            catSel.appendChild(catPlaceholder);
            datasetManager.getCategories().forEach(cat => {
                const opt = document.createElement('option');
                opt.value = cat;
                opt.textContent = cat;
                catSel.appendChild(opt);
            });
            categorySelect.appendChild(catSel);
            selectorContainer.appendChild(categorySelect);

            const subcategorySelect = document.createElement('div');
            subcategorySelect.className = 'select-wrapper';
            const subLabel = document.createElement('label');
            subLabel.setAttribute('data-i18n', 'create.select_subcategory');
            subLabel.textContent = 'Subcategory';
            subcategorySelect.appendChild(subLabel);
            const subSel = document.createElement('select');
            subSel.className = 'styled-select';
            subSel.disabled = true;
            subcategorySelect.appendChild(subSel);
            selectorContainer.appendChild(subcategorySelect);

            const datasetSelect = document.createElement('div');
            datasetSelect.className = 'select-wrapper';
            const dsLabel = document.createElement('label');
            dsLabel.setAttribute('data-i18n', 'create.select_dataset');
            dsLabel.textContent = 'Dataset';
            datasetSelect.appendChild(dsLabel);
            const dsSel = document.createElement('select');
            dsSel.className = 'styled-select';
            dsSel.disabled = true;
            datasetSelect.appendChild(dsSel);
            selectorContainer.appendChild(datasetSelect);

            // Viewer
            const viewerContainer = document.getElementById('dataset-viewer-container');
            AutoBingo.DatasetViewer.init(viewerContainer, datasetManager);

            // Event handlers
            catSel.addEventListener('change', () => {
                subSel.innerHTML = '';
                dsSel.innerHTML = '';
                dsSel.disabled = true;
                const cat = catSel.value;
                if (!cat) { subSel.disabled = true; return; }
                datasetManager.getSubcategories(cat).forEach(sub => {
                    const opt = document.createElement('option');
                    opt.value = sub;
                    opt.textContent = sub;
                    subSel.appendChild(opt);
                });
                subSel.disabled = false;
                subSel.value = '';
                const placeholder = document.createElement('option');
                placeholder.value = '';
                placeholder.disabled = true;
                placeholder.selected = true;
                placeholder.setAttribute('data-i18n', 'create.no_subcategory');
                placeholder.textContent = '-- Select a subcategory --';
                subSel.insertBefore(placeholder, subSel.firstChild);
                if (AutoBingo.translationManager) AutoBingo.translationManager.translatePage();
            });

            subSel.addEventListener('change', () => {
                dsSel.innerHTML = '';
                const cat = catSel.value;
                const sub = subSel.value;
                if (!cat || !sub) { dsSel.disabled = true; return; }
                datasetManager.getDatasets(cat, sub).forEach(ds => {
                    const opt = document.createElement('option');
                    opt.value = ds.name;
                    const flags = (ds.flags || []).join(', ');
                    opt.textContent = flags ? `${ds.name} [${flags}]` : ds.name;
                    dsSel.appendChild(opt);
                });
                dsSel.disabled = false;
                dsSel.value = '';
                const placeholder = document.createElement('option');
                placeholder.value = '';
                placeholder.disabled = true;
                placeholder.selected = true;
                placeholder.setAttribute('data-i18n', 'create.no_dataset');
                placeholder.textContent = '-- Select a dataset --';
                dsSel.insertBefore(placeholder, dsSel.firstChild);
                if (AutoBingo.translationManager) AutoBingo.translationManager.translatePage();
            });

            dsSel.addEventListener('change', async () => {
                const name = dsSel.value;
                if (!name) { return; }
                const def = datasetManager.getDatasetByName(name);
                if (def) {
                    const items = await datasetManager.loadDatasetItems(def);
                    AutoBingo.DatasetViewer.onDatasetSelected(items, def);
                }
            });

            // Translate page
            translator.translatePage();
        })();
    </script>
</body>
</html>

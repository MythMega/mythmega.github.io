<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create and edit custom bingo dataset JSON files with AutoBingo Dataset Maker. Add items with images, quantities, and flags. Free and open source.">
    <meta name="keywords" content="dataset creator, bingo dataset, json editor, custom bingo, create bingo dataset, bingo maker">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="AutoBingo - Dataset Creator">
    <meta property="og:description" content="Create and edit custom bingo dataset JSON files. Add items with images, quantities, and flags.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mythmega.github.io/creator.html">
    <link rel="canonical" href="https://mythmega.github.io/creator.html">
    <title>AutoBingo - Dataset Creator | Make Custom Bingo JSON</title>
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/nav.css">
    <link rel="stylesheet" href="styles/creator.css">
</head>
<body>
    <!-- Navigation -->
    <div id="nav-container"></div>

    <!-- Main Content -->
    <main class="main-content" style="max-width: 1100px;">
        <div class="card" style="padding: 0; background: none; border: none; box-shadow: none;">
            <h1 class="page-title" data-i18n="creator.page_title">Dataset Creator</h1>
            <p class="page-subtitle" data-i18n="creator.page_subtitle">Create or edit bingo dataset JSON files</p>
            <div id="creator-app"></div>
        </div>
    </main>

    <!-- Scripts - Entity -->
    <script src="js/entity/DatasetDefinition.js"></script>
    <script src="js/entity/DatasetItem.js"></script>
    <script src="js/entity/BingoGame.js"></script>

    <!-- Scripts - Business -->
    <script src="js/business/cookieManager.js"></script>
    <script src="js/business/translationManager.js"></script>
    <script src="js/business/themeManager.js"></script>
    <script src="js/business/datasetManager.js"></script>
    <script src="js/business/navigationManager.js"></script>

    <!-- Scripts - Visual -->
    <script src="js/visual/navRenderer.js"></script>
    <script src="js/visual/themeToggle.js"></script>
    <script src="js/visual/languageToggle.js"></script>
    <script src="js/visual/creatorApp.js"></script>

    <!-- Init -->
    <script>
        (async function() {
            'use strict';

            // Init managers
            AutoBingo.ThemeManager.init();

            const lang = AutoBingo.CookieManager.get('bingo_lang') || 'en';
            const translator = new AutoBingo.TranslationManager();
            AutoBingo.translationManager = translator;
            await translator.load(lang);

            // Render navigation
            AutoBingo.NavRenderer.render(document.getElementById('nav-container'));

            // Create floating toggles
            AutoBingo.ThemeToggle.create();
            AutoBingo.LanguageToggle.create();

            // Init the creator app
            AutoBingo.CreatorApp.init();

            // Translate page
            translator.translatePage();
        })();
    </script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" width="640" height="360" viewBox="0 0 640 360">
  <!-- KOKORO GAME : KINTSUGI — Skatepark Environment Hitbox Reference -->
  <!-- Resolution: 640x360px | World: 1920px | Tile: 16x16px -->

  <text x="6" y="14" fill="#ff4444" font-family="monospace" font-size="11" font-weight="bold">SKATEPARK — HITBOX REFERENCE</text>
  <text x="6" y="26" fill="#ff8888" font-family="monospace" font-size="9">RED=platform | GREEN=grindable | BLUE=rail | PURPLE=ramp curve</text>

  <!-- GROUND -->
  <rect x="0" y="288" width="640" height="72" fill="rgba(255,60,60,0.18)" stroke="#ff4444" stroke-width="2"/>
  <text x="6" y="304" fill="#ff4444" font-family="monospace" font-size="9">GROUND  y=288</text>

  <!-- QUARTER PIPE LEFT (x=0–120, y=160–288) — curved ramp -->
  <!-- Approximate the curve with a path (for visual reference only) -->
  <path d="M 120 288 Q 120 160 0 160" fill="rgba(160,60,255,0.12)" stroke="#bb44ff" stroke-width="2"/>
  <!-- Grindable lip at top -->
  <rect x="0" y="155" width="120" height="10" fill="rgba(60,255,120,0.4)" stroke="#44ff88" stroke-width="1.5"/>
  <text x="4" y="152" fill="#bb44ff" font-family="monospace" font-size="8">QUARTER_L  x:0–120  GRINDABLE LIP y=155–165</text>

  <!-- BOX 1 (x=250–400, y=248–288) -->
  <rect x="250" y="248" width="150" height="40" fill="rgba(255,60,60,0.15)" stroke="#ff8888" stroke-width="1.5" stroke-dasharray="4,2"/>
  <!-- Grindable top -->
  <rect x="250" y="248" width="150" height="5" fill="rgba(60,255,120,0.45)" stroke="#44ff88" stroke-width="1.5"/>
  <text x="252" y="244" fill="#44ff88" font-family="monospace" font-size="8">BOX_1  x:250–400  GRINDABLE TOP y=248</text>

  <!-- MANUAL PAD (x=500–620, y=272–288) -->
  <rect x="500" y="272" width="120" height="16" fill="rgba(255,200,60,0.25)" stroke="#ffcc3c" stroke-width="1.5"/>
  <text x="502" y="268" fill="#ffcc3c" font-family="monospace" font-size="8">MANUAL_PAD  x:500–620  y:272</text>

  <!-- BOX 2 partial view (x=700 — off screen right) -->
  <!-- Just an arrow/text indicator -->
  <text x="580" y="260" fill="#666666" font-family="monospace" font-size="8">→ BOX_2 x:700</text>
  <text x="580" y="270" fill="#666666" font-family="monospace" font-size="8">  + RAIL x:730</text>
  <text x="580" y="280" fill="#666666" font-family="monospace" font-size="8">→ QUARTER_R x:1680</text>

  <!-- Spawn -->
  <circle cx="200" cy="256" r="6" fill="none" stroke="#ffff44" stroke-width="2"/>
  <text x="208" y="261" fill="#ffff44" font-family="monospace" font-size="8">SPAWN (200,256)</text>

  <!-- World bounds -->
  <rect x="0" y="0" width="640" height="360" fill="none" stroke="#444444" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="548" y="356" fill="#555555" font-family="monospace" font-size="8">VIEW x:0–640 / 1920</text>

  <!-- Legend -->
  <rect x="440" y="308" width="194" height="46" fill="rgba(0,0,0,0.6)" stroke="#333333" stroke-width="1"/>
  <rect x="444" y="312" width="10" height="6" fill="rgba(255,60,60,0.5)" stroke="#ff4444" stroke-width="1"/>
  <text x="457" y="318" fill="#ff4444" font-family="monospace" font-size="7">Ground / Box body</text>
  <rect x="444" y="320" width="10" height="6" fill="rgba(60,255,120,0.5)" stroke="#44ff88" stroke-width="1"/>
  <text x="457" y="326" fill="#44ff88" font-family="monospace" font-size="7">Grindable surface (top/lip)</text>
  <path d="M 444 340 Q 454 333 464 333" fill="none" stroke="#bb44ff" stroke-width="2"/>
  <text x="468" y="336" fill="#bb44ff" font-family="monospace" font-size="7">Ramp curve</text>
  <rect x="444" y="342" width="10" height="6" fill="rgba(255,200,60,0.4)" stroke="#ffcc3c" stroke-width="1"/>
  <text x="457" y="348" fill="#ffcc3c" font-family="monospace" font-size="7">Manual pad</text>
</svg>

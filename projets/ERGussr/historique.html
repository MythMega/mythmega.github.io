<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elden Description — Historique</title>
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="./index.html">Elden Desc.</a>
    <button class="nav-toggle" id="nav-toggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="nav-links">
      <li><a class="nav-link" href="./index.html"        data-i18n="nav.home"></a></li>
      <li><a class="nav-link" href="./practice.html"     data-i18n="nav.practice"></a></li>
      <li><a class="nav-link" href="./daily.html"        data-i18n="nav.daily"></a></li>
      <li><a class="nav-link" href="./replay.html"       data-i18n="nav.replay"></a></li>
      <li><a class="nav-link" href="./historique.html"   data-i18n="nav.historique"></a></li>
      <li><a class="nav-link" href="./settings.html"     data-i18n="nav.settings"></a></li>
      <li><a class="nav-link" href="./credits.html"      data-i18n="nav.credits"></a></li>
    </ul>
  </nav>

  <main class="page-wrapper page-wrapper--wide">
    <div class="text-center mb-3">
      <h2 data-i18n="historique.title"></h2>
    </div>

    <div id="history-loading" class="text-center text-muted mt-3">
      <p data-i18n="common.loading"></p>
    </div>

    <div id="history-empty" class="card text-center hidden">
      <p data-i18n="historique.empty"></p>
    </div>

    <div id="history-content" class="hidden">
      <div class="history-layout">

        <!-- Column 1 : liste des jours -->
        <div class="history-col-list">
          <div id="history-list"></div>
          <div class="history-pagination" id="history-pagination"></div>
        </div>

        <!-- Column 2 : graphique + statistiques -->
        <div class="history-col-stats">
          <div class="card mb-2">
            <canvas id="history-chart" height="160"></canvas>
          </div>
          <div id="history-stats"></div>
        </div>

      </div>
    </div>
  </main>

  <script type="module" src="./scripts/pages/historique.js"></script>
</body>
</html>

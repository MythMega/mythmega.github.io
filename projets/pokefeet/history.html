<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pokefeet — Historique</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" />
  <link rel="stylesheet" href="style.css" />
  <style>
    .hist-tabs { display:flex; gap:8px; justify-content:center; max-width:420px; margin:0 auto 1.5rem; }
    .hist-tab-btn {
      flex:1; padding:8px 0; border:1px solid rgba(255,255,255,0.1);
      border-radius:8px; background:rgba(255,255,255,0.03);
      color:var(--muted,#94a3b8); cursor:pointer; font-weight:600;
      font-size:.9rem; transition:background .15s,color .15s;
    }
    .hist-tab-btn.active { background:var(--accent,#34d399); color:#052018; border-color:transparent; }
  </style>
</head>
<body>
  <main id="app">
    <header>
      <h1 data-i18n="history.title">Historique — Pokefeet</h1>
      <div class="scoreboard">
        <div><span id="totalCountLabel" data-i18n="history.totalDays">Total entrées</span> : <span id="totalDays">0</span></div>
      </div>
    </header>

    <div class="hist-tabs">
      <button class="hist-tab-btn active" id="histTabDailyBtn">Daily</button>
      <button class="hist-tab-btn" id="histTabWeeklyBtn">Weekly</button>
    </div>

    <section class="game-area container py-3">

      <div id="histDailyPanel">
        <div class="center-card-history d-flex flex-column flex-lg-row gap-3 align-items-start">
          <div id="historyChartWrap" class="flex-fill order-1 order-lg-2" style="min-width:260px;">
            <h3 class="h5" data-i18n="history.scoreChart">Scores (30 derniers jours)</h3>
            <div class="card p-2 bg-transparent border-0">
              <canvas id="historyChart" width="600" height="320" style="width:100%; height:320px; background:rgba(255,255,255,0.02); border-radius:8px;"></canvas>
              <div id="chartStats" class="mt-2 text-muted small"></div>
            </div>
          </div>
          <div id="historyList" class="flex-fill order-2 order-lg-1" style="min-width:220px; max-width:520px;"></div>
        </div>
        <section class="container py-2">
          <div id="detailedStats" class="mt-2"></div>
        </section>
      </div>

      <div id="histWeeklyPanel" style="display:none;">
        <div class="center-card-history d-flex flex-column flex-lg-row gap-3 align-items-start">
          <div id="weeklyChartWrap" class="flex-fill order-1 order-lg-2" style="min-width:260px;">
            <h3 class="h5" data-i18n="history.scoreChartWeekly">Scores (dernières semaines)</h3>
            <div class="card p-2 bg-transparent border-0">
              <canvas id="weeklyChart" width="600" height="320" style="width:100%; height:320px; background:rgba(255,255,255,0.02); border-radius:8px;"></canvas>
              <div id="weeklyChartStats" class="mt-2 text-muted small"></div>
            </div>
          </div>
          <div id="weeklyHistoryList" class="flex-fill order-2 order-lg-1" style="min-width:220px; max-width:520px;"></div>
        </div>
        <section class="container py-2">
          <div id="weeklyDetailedStats" class="mt-2"></div>
        </section>
      </div>
    </section>

    <a href="./index.html"><button id="retourBtn" class="secondary" style="padding:10px 12px;" data-i18n="common.backHome">Retour à l'accueil</button></a>
    <div id="notifications" aria-live="polite"></div>
  </main>

  <script src="loader.js"></script>
  <script src="translate.js"></script>
  <script src="language-switcher.js"></script>
  <script src="footer.js"></script>
  <script src="i18n-setup.js"></script>
  <script src="migration.js"></script>
  <script src="pokemon-versions.js"></script>
  <script src="history.js"></script>
  <script src="history_curve.js"></script>
</body>
</html>

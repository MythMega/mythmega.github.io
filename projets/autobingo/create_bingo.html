<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Create custom bingo grids with AutoBingo. Choose from 300+ presets across 25+ games including Minecraft, Pokémon, Zelda. Randomize items, add OBS overlay for streaming.">
    <meta name="keywords" content="create bingo, custom bingo, bingo generator, minecraft bingo, pokemon bingo, zelda bingo, random bingo, streamer bingo, OBS overlay bingo">
    <meta name="robots" content="index, follow">
    <meta property="og:title" content="AutoBingo - Create Custom Bingo Grid">
    <meta property="og:description" content="Choose from 300+ presets or create your own bingo grid. Supports 25+ games with OBS overlay for streamers.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://mythmega.github.io/create_bingo.html">
    <link rel="canonical" href="https://mythmega.github.io/create_bingo.html">
    <title>AutoBingo - Create Custom Bingo Grid | 25+ Games</title>
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/nav.css">
</head>
<body>
    <!-- Navigation -->
    <div id="nav-container"></div>

    <!-- Main Content -->
    <main class="main-content">
        <div class="card">
            <h1 class="page-title" data-i18n="create.title">Create a Bingo</h1>

            <!-- Category selector will be rendered here -->
            <div id="selector-container"></div>

            <!-- Controls checkboxes -->
            <div id="controls-container" style="margin-top: 16px; display: flex; gap: 16px; flex-wrap: wrap;">
                <label style="display: inline-flex; align-items: center; gap: 6px; cursor: pointer;">
                    <input type="checkbox" id="ctrl-lock" class="control-checkbox">
                    <span data-i18n="bingo.lock_grid">Lock Grid</span>
                </label>
                <label style="display: inline-flex; align-items: center; gap: 6px; cursor: pointer;">
                    <input type="checkbox" id="ctrl-hide" class="control-checkbox">
                    <span data-i18n="bingo.hide_items">Hide</span>
                </label>
                <label style="display: inline-flex; align-items: center; gap: 6px; cursor: pointer;">
                    <input type="checkbox" id="ctrl-blur" class="control-checkbox">
                    <span data-i18n="bingo.blur_items">Blur</span>
                </label>
            </div>

            <!-- Create button -->
            <div class="text-center mt-24">
                <button id="create-bingo-btn" class="btn btn-primary" disabled data-i18n="create.create_button">
                    Create Bingo
                </button>
                <button id="pin-preset-btn" class="btn btn-secondary" disabled style="display:none;" data-i18n="create.pin_preset">
                    Pin Configuration
                </button>
            </div>
        </div>
    </main>

    <!-- Scripts - Entity -->
    <script src="js/entity/DatasetDefinition.js"></script>
    <script src="js/entity/DatasetItem.js"></script>
    <script src="js/entity/BingoGame.js"></script>

    <!-- Scripts - Business -->
    <script src="js/business/cookieManager.js"></script>
    <script src="js/business/translationManager.js"></script>
    <script src="js/business/themeManager.js"></script>
    <script src="js/business/datasetManager.js"></script>
    <script src="js/business/navigationManager.js"></script>
    <script src="js/business/presetManager.js"></script>

    <!-- Scripts - Visual -->
    <script src="js/visual/navRenderer.js"></script>
    <script src="js/visual/themeToggle.js"></script>
    <script src="js/visual/languageToggle.js"></script>
    <script src="js/visual/categorySelector.js"></script>

    <!-- Init -->
    <script>
        (async function() {
            'use strict';

            // Init managers
            AutoBingo.ThemeManager.init();

            const lang = AutoBingo.CookieManager.get('bingo_lang') || 'en';
            const translator = new AutoBingo.TranslationManager();
            AutoBingo.translationManager = translator;
            await translator.load(lang);

            // Render navigation
            AutoBingo.NavRenderer.render(document.getElementById('nav-container'));

            // Create floating toggles
            AutoBingo.ThemeToggle.create();
            AutoBingo.LanguageToggle.create();

            // Init dataset manager
            const datasetManager = new AutoBingo.DatasetManager();
            await datasetManager.loadDefinitions();

            // Render category selector
            const container = document.getElementById('selector-container');
            const selector = new AutoBingo.CategorySelector(container, datasetManager);
            selector.onReady = (def, items) => {
                document.getElementById('create-bingo-btn').disabled = false;
                document.getElementById('pin-preset-btn').disabled = false;
                document.getElementById('pin-preset-btn').style.display = 'inline-block';
            };
            await selector.render();

            // Translate page
            translator.translatePage();

            // Create bingo button handler
            document.getElementById('create-bingo-btn').addEventListener('click', () => {
                const def = selector.getSelectedDataset();
                if (def) {
                    const size = selector.getSelectedSize();
                    const params = { id: def.name, size: size };
                    const lock = document.getElementById('ctrl-lock').checked;
                    const hide = document.getElementById('ctrl-hide').checked;
                    const blur = document.getElementById('ctrl-blur').checked;
                    if (lock || hide || blur) {
                        params.controls = (lock ? '1' : '0') + (hide ? '1' : '0') + (blur ? '1' : '0');
                    }
                    AutoBingo.NavigationManager.navigateTo('bingo.html', params);
                }
            });

            // Pin preset button handler
            document.getElementById('pin-preset-btn').addEventListener('click', () => {
                const def = selector.getSelectedDataset();
                if (def) {
                    const size = selector.getSelectedSize();
                    const cat = def.category;
                    const sub = def.subcategory;
                    const lock = document.getElementById('ctrl-lock').checked;
                    const hide = document.getElementById('ctrl-hide').checked;
                    const blur = document.getElementById('ctrl-blur').checked;
                    AutoBingo.PresetManager.save(def.name, size, cat, sub, lock, hide, blur);
                    
                    // Visual feedback
                    const btn = document.getElementById('pin-preset-btn');
                    btn.textContent = '✅';
                    setTimeout(() => {
                        if (AutoBingo.translationManager) {
                            btn.textContent = AutoBingo.translationManager.t('create.pin_preset');
                        } else {
                            btn.textContent = '📌 Pin Configuration';
                        }
                    }, 1500);
                }
            });

            // Store reference
            AutoBingo.currentSelector = selector;

            // After rendering, check the button state
            setTimeout(() => {
                if (selector.getSelectedDataset()) {
                    document.getElementById('create-bingo-btn').disabled = false;
                    document.getElementById('pin-preset-btn').disabled = false;
                    document.getElementById('pin-preset-btn').style.display = 'inline-block';
                }
            }, 300);
        })();
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ERGussr — Settings</title>
  <link rel="stylesheet" href="./styles/main.css">
</head>
<body>
  <nav class="navbar">
    <a class="navbar-brand" href="./index.html">ERGussr</a>
    <button class="nav-toggle" id="nav-toggle" aria-label="Menu">
      <span></span><span></span><span></span>
    </button>
    <ul class="nav-links" id="nav-links">
      <li><a class="nav-link" href="./index.html"    data-i18n="nav.home"></a></li>
      <li><a class="nav-link" href="./practice.html" data-i18n="nav.practice"></a></li>
      <li><a class="nav-link" href="./daily.html"    data-i18n="nav.daily"></a></li>
      <li><a class="nav-link" href="./replay.html"   data-i18n="nav.replay"></a></li>
      <li><a class="nav-link" href="./settings.html" data-i18n="nav.settings"></a></li>
      <li><a class="nav-link" href="./credits.html"  data-i18n="nav.credits"></a></li>
    </ul>
  </nav>

  <main class="page-wrapper">
    <h2 data-i18n="settings.title"></h2>

    <!-- Language -->
    <div class="settings-section mt-3">
      <h3 data-i18n="settings.language"></h3>
      <div class="settings-row mt-2">
        <button class="lang-btn" id="lang-fr" data-i18n="settings.lang_fr"></button>
        <button class="lang-btn" id="lang-en" data-i18n="settings.lang_en"></button>
      </div>
    </div>

    <!-- Save / Load -->
    <div class="settings-section">
      <h3 data-i18n="settings.export"></h3>
      <div class="settings-row mt-2">
        <button class="btn btn-primary" id="btn-export" data-i18n="settings.export"></button>
      </div>
    </div>

    <div class="settings-section">
      <h3 data-i18n="settings.import"></h3>
      <div class="settings-row mt-2">
        <input type="file" id="import-file" accept=".save" style="display:none">
        <button class="btn btn-secondary" id="btn-import" data-i18n="settings.import"></button>
      </div>
    </div>

    <!-- Danger zone -->
    <div class="settings-section">
      <h3 class="text-error" data-i18n="settings.delete"></h3>
      <div class="settings-row mt-2">
        <button class="btn btn-danger" id="btn-delete" data-i18n="settings.delete"></button>
      </div>
    </div>
  </main>

  <script type="module" src="./scripts/pages/settings.js"></script>
</body>
</html>

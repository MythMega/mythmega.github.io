<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoBingo</title>
    <link rel="stylesheet" href="styles/theme.css">
    <link rel="stylesheet" href="styles/main.css">
    <link rel="stylesheet" href="styles/nav.css">
</head>
<body>
    <!-- Navigation -->
    <div id="nav-container"></div>

    <!-- Main Content -->
    <main class="main-content">
        <div class="card text-center">
            <h1 class="page-title" data-i18n="home.title">AutoBingo</h1>
            <p class="page-subtitle" data-i18n="home.subtitle">Create and play bingo games from your favorite datasets!</p>

            <button class="btn btn-primary mt-24" onclick="window.location.href='create_bingo.html'" data-i18n="home.create_button">
                Create a Bingo Grid
            </button>
        </div>

        <!-- Presets Section -->
        <div class="card mt-24" id="presets-section" style="display:none;">
            <h2 class="card-title" data-i18n="home.presets_title">Saved Presets</h2>
            <div id="presets-list"></div>
        </div>
    </main>

    <!-- Scripts - Entity -->
    <script src="js/entity/DatasetDefinition.js"></script>
    <script src="js/entity/DatasetItem.js"></script>
    <script src="js/entity/BingoGame.js"></script>

    <!-- Scripts - Business -->
    <script src="js/business/cookieManager.js"></script>
    <script src="js/business/translationManager.js"></script>
    <script src="js/business/themeManager.js"></script>
    <script src="js/business/datasetManager.js"></script>
    <script src="js/business/navigationManager.js"></script>
    <script src="js/business/presetManager.js"></script>

    <!-- Scripts - Visual -->
    <script src="js/visual/navRenderer.js"></script>
    <script src="js/visual/themeToggle.js"></script>
    <script src="js/visual/languageToggle.js"></script>

    <!-- Init -->
    <script>
        (async function() {
            'use strict';

            // Init cookie-based managers
            AutoBingo.ThemeManager.init();

            // Init translation from cookie
            const lang = AutoBingo.CookieManager.get('bingo_lang') || 'en';
            const translator = new AutoBingo.TranslationManager();
            AutoBingo.translationManager = translator;
            await translator.load(lang);

            // Render navigation
            AutoBingo.NavRenderer.render(document.getElementById('nav-container'));

            // Create floating toggles
            AutoBingo.ThemeToggle.create();
            AutoBingo.LanguageToggle.create();

            // Render presets
            renderPresets();

            // Translate page
            translator.translatePage();
        })();

        function renderPresets() {
            const presets = AutoBingo.PresetManager.loadAll();
            const section = document.getElementById('presets-section');
            const list = document.getElementById('presets-list');

            if (presets.length === 0) {
                section.style.display = 'none';
                return;
            }

            section.style.display = 'block';
            list.innerHTML = '';

            presets.forEach(preset => {
                const item = document.createElement('div');
                item.className = 'preset-item';

                const info = document.createElement('div');
                info.className = 'preset-info';

                const nameSpan = document.createElement('span');
                nameSpan.className = 'preset-dataset';
                nameSpan.textContent = preset.dataset;
                info.appendChild(nameSpan);

                const detailSpan = document.createElement('span');
                detailSpan.className = 'preset-detail';
                const lang = AutoBingo.translationManager ? AutoBingo.translationManager.currentLang : 'en';
                detailSpan.textContent = `${preset.category} › ${preset.subcategory} — ${preset.size}x${preset.size}`;
                info.appendChild(detailSpan);

                item.appendChild(info);

                const actions = document.createElement('div');
                actions.className = 'preset-actions';

                // Play button
                const playBtn = document.createElement('button');
                playBtn.className = 'btn btn-primary preset-btn';
                playBtn.setAttribute('data-i18n', 'home.preset_play');
                playBtn.textContent = '▶ Play';
                playBtn.addEventListener('click', () => {
                    AutoBingo.NavigationManager.navigateTo('bingo.html', { id: preset.dataset, size: preset.size });
                });
                actions.appendChild(playBtn);

                // Configure button
                const configBtn = document.createElement('button');
                configBtn.className = 'btn btn-secondary preset-btn';
                configBtn.setAttribute('data-i18n', 'home.preset_configure');
                configBtn.textContent = '⚙ Configure';
                configBtn.addEventListener('click', () => {
                    AutoBingo.NavigationManager.navigateTo('create_bingo.html', { Dataset: preset.dataset, Size: preset.size });
                });
                actions.appendChild(configBtn);

                // Delete button
                const delBtn = document.createElement('button');
                delBtn.className = 'btn btn-secondary preset-btn preset-delete';
                delBtn.setAttribute('data-i18n', 'home.preset_delete');
                delBtn.textContent = '✕ Delete';
                delBtn.addEventListener('click', () => {
                    AutoBingo.PresetManager.delete(preset.id);
                    renderPresets();
                    if (AutoBingo.translationManager) {
                        AutoBingo.translationManager.translatePage();
                    }
                });
                actions.appendChild(delBtn);

                item.appendChild(actions);
                list.appendChild(item);
            });
        }
    </script>
</body>
</html>

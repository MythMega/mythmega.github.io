<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>StreamDex</title>
  <link rel="stylesheet" href="assets/streamdex.css">
</head>
<body>
  <nav class="sd-navbar">
    <div class="sd-container sd-navbar__inner">
      <a href="main.html" class="sd-navbar__brand">🎮 StreamDex</a>
      <div class="sd-navbar__links">
        <a href="main.html" class="sd-navbar__link">Accueil</a>
        <a href="availablepokemon.html" class="sd-navbar__link">Pokédex</a>
        <a href="balldex.html" class="sd-navbar__link">Balls</a>
        <a href="zonedex.html" class="sd-navbar__link">Zones</a>
        <a href="pokestats.html" class="sd-navbar__link">Stats</a>
        <a href="buypokemon.html" class="sd-navbar__link">Boutique</a>
        <a href="scrappokemon.html" class="sd-navbar__link">Scrap</a>
        <a href="records.html" class="sd-navbar__link">Records</a>
      </div>
    </div>
  </nav>

  <div class="sd-page">
    <div class="sd-container">

      <!-- Header -->
      <div class="sd-section-header" style="margin-bottom:24px">
        <h1>📊 StreamDex — Tableau de bord</h1>
      </div>

      <!-- Widget recherche utilisateur (rendu statique, peuplé par le JS) -->
      <div class="sd-card" style="margin-bottom:24px;padding:28px 24px 32px;min-height:160px;overflow:visible">
        <h2 style="font-size:15px;margin:0 0 18px">🔍 Accéder au Pokédex d'un joueur</h2>
        <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end">

          <!-- Boutons plateforme (peuplés par JS) -->
          <div style="display:flex;flex-direction:column;gap:6px">
            <label style="font-size:12px;color:var(--text-secondary)">Plateforme</label>
            <div id="platform-buttons" style="display:flex;gap:8px;flex-wrap:wrap">
              <!-- rempli par main.js -->
            </div>
          </div>

          <!-- Champ pseudo + autocomplete -->
          <div style="display:flex;flex-direction:column;gap:6px;flex:1;min-width:200px">
            <label for="user-search-input" style="font-size:12px;color:var(--text-secondary)">Pseudo</label>
            <div style="position:relative">
              <input class="sd-input" id="user-search-input" type="text"
                placeholder="Entrez un pseudo..."
                autocomplete="off"
                style="width:100%;font-size:15px;padding:10px 14px">
              <ul id="autocomplete-list" style="
                display:none;position:absolute;top:calc(100% + 4px);left:0;right:0;
                z-index:9999;
                background:var(--bg-card);border:1px solid var(--border-color);
                border-radius:var(--radius-sm);margin:0;padding:0;list-style:none;
                max-height:240px;overflow-y:auto;box-shadow:var(--shadow-md)"></ul>
            </div>
          </div>

          <!-- Bouton valider -->
          <button class="sd-btn sd-btn--primary" id="goto-user-btn"
            style="align-self:flex-end;padding:10px 20px;font-size:15px">
            Voir le Pokédex →
          </button>
        </div>

        <!-- Message d'erreur inline -->
        <div id="user-error" style="display:none;margin-top:14px" class="sd-error"></div>
      </div>

      <!-- Zone des statistiques (remplie par le JS après chargement de main.json) -->
      <div id="sd-stats-section">
        <div class="sd-loading">
          <div class="sd-loading__spinner"></div>
          <p>Chargement des statistiques…</p>
        </div>
      </div>

    </div>
  </div>

  <footer class="sd-footer">
    <div class="sd-container">StreamDex — Données chargées dynamiquement</div>
  </footer>

  <script src="assets/js/utils.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
